name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pi-contract:
    name: Raspberry Pi message-contract checks
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Compile Pi bridge sources
        run: python -m py_compile robot-pi/agent.py robot-pi/local_store.py robot-pi/message_contract.py

      - name: Run Pi contract tests
        run: python -m unittest discover -s robot-pi -p "test_*.py" -v

      - name: Run ESP32 host protocol tests
        run: python -m unittest discover -s MIIT_Rover_ESP32_Firmware_v0.2.0/robot-esp32/tests -p "test_*.py" -v

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run check

      - name: Run unit tests
        run: npm run test:unit

      - name: Build frontend
        run: npm run build:vite

  supabase-emqx-integration:
    name: Supabase and EMQX contract tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test EMQX publish response handling
        run: npm run test:emqx-publish

      - name: Run local integration suite
        run: npm run test:integration
